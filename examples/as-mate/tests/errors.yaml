# 异常场景测试套件
# 迁移自: as-mate/e2e/tests/error-handling.e2e.ts
#
# 验证各种错误情况的处理

name: 异常场景
description: 验证各种错误情况的处理
sequential: true

setup:
  - waitHealthy:
      timeout: 60s

cases:
  # ── 参数校验 ──────────────────────────────────────────────────

  - name: "POST /create 空 body 返回 400"
    request:
      method: POST
      path: /create
      body: {}
    expect:
      status: 400

  - name: "POST /create 缺少 template 返回 400"
    request:
      method: POST
      path: /create
      body:
        game_id: test
        game_name: test
        token: test
    expect:
      status: 400

  - name: "POST /vibe 空 body 返回 400"
    request:
      method: POST
      path: /vibe
      body: {}
    expect:
      status: 400

  - name: "POST /play 空 body 返回 400"
    request:
      method: POST
      path: /play
      body: {}
    expect:
      status: 400

  - name: "POST /event 缺少 type 返回 400"
    request:
      method: POST
      path: /event
      body:
        data: test
    expect:
      status: 400

  - name: "POST /event 缺少 data 返回 400"
    request:
      method: POST
      path: /event
      body:
        type: test
    expect:
      status: 400

  # ── 不存在的 API 路由 ─────────────────────────────────────────

  - name: "GET /api/nonexistent 返回 404"
    request:
      method: GET
      path: /api/nonexistent
    expect:
      status: 404

  # ── Admin API ─────────────────────────────────────────────────

  - name: "GET /api/status 返回有效数据"
    request:
      method: GET
      path: /api/status
    expect:
      status: 200

  - name: "GET /api/metrics 返回指标数据"
    request:
      method: GET
      path: /api/metrics
    expect:
      status: 200

  - name: "GET /api/config 返回配置"
    request:
      method: GET
      path: /api/config
    expect:
      status: 200

  - name: "POST /api/actions/invalid 返回 400"
    request:
      method: POST
      path: /api/actions/nonexistent
    expect:
      status: 400

  # ── 并发请求 ──────────────────────────────────────────────────

  - name: "并发健康检查请求 1"
    request:
      method: GET
      path: /livez
    expect:
      status: 200

  - name: "并发健康检查请求 2"
    request:
      method: GET
      path: /livez
    expect:
      status: 200

