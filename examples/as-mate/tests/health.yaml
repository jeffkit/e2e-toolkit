name: 健康检查
description: "验证容器的健康检查接口是否正常工作"

setup:
  - waitHealthy:
      timeout: 60s

cases:
  - name: GET /livez 返回 200
    request:
      method: GET
      path: /livez
    expect:
      status: 200
      body:
        status: ok

  - name: GET /readyz 返回就绪或未就绪状态
    request:
      method: GET
      path: /readyz
    expect:
      # COS 未连接时返回 503，已连接时返回 200
      status: [200, 503]

  - name: GET /health 返回健康信息
    request:
      method: GET
      path: /health
    expect:
      # /health 可能返回 200 或 503（unhealthy 也是正常响应）
      status: [200, 503]
      body:
        status:
          in: ["healthy", "unhealthy"]

  - name: GET /idle 返回空闲状态
    request:
      method: GET
      path: /idle
    expect:
      status: 200
      body:
        idle:
          type: boolean
