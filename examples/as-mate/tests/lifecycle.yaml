name: 完整生命周期
description: "验证完整的游戏生命周期：create → 状态检查 → event → shutdown"

variables:
  game_id: e2e-lifecycle-{{timestamp}}
  token: e2e-lifecycle-token
  template: phaser-2d

setup:
  - waitHealthy:
      timeout: 60s
  - name: 清理旧状态
    request:
      method: POST
      path: /shutdown/force
    ignoreError: true
  - delay: 3s

cases:
  - name: "Step 1: 创建游戏"
    request:
      method: POST
      path: /create
      body:
        game_id: "{{game_id}}"
        game_name: Lifecycle Test
        template: "{{template}}"
        token: "{{token}}"
      timeout: 60s
    expect:
      status: 200
      body:
        success: 0

  - name: "Step 2: 等待进程就绪"
    delay: 10s
    request:
      method: GET
      path: /api/status
    expect:
      status: 200
      body:
        instance: exists

  - name: "Step 3: 发送 activity 活动"
    request:
      method: POST
      path: /activity
      body:
        source: preview
    expect:
      status: 200

  - name: "Step 4: 验证非空闲状态"
    request:
      method: GET
      path: /idle
    expect:
      body:
        idle: false

  - name: "Step 5: 发送事件"
    request:
      method: POST
      path: /event
      body:
        type: allow_join
        data: '{"user_id": "test-user"}'
    expect:
      # event 可能因为 gateway 不可达而失败（mock 模式下应该成功）
      status: 200

  - name: "Step 6: 优雅关闭"
    request:
      method: POST
      path: /shutdown
      timeout: 120s
    expect:
      status: 200
      body:
        success: exists

  - name: "Step 7: 关闭后容器仍健康"
    delay: 3s
    request:
      method: GET
      path: /livez
    expect:
      status: 200

  - name: "Step 8: 关闭后无活跃游戏"
    delay: 2s
    request:
      method: GET
      path: /health
    expect:
      body:
        game_id: null
        mode: idle
